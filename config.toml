base_url = "https://semog.nl"
theme = "terminus"
title = "semog.nl"
description = "Thoughtful notes on software, systems, and the craft behind them."
compile_sass = false
build_search_index = true
generate_feeds = true
feed_filenames = ["rss.xml"]
minify_html = true
author = "Aksum"

taxonomies = [
  { name = "tags", feed = true },
]

[markdown]
smart_punctuation = true
bottom_footnotes = true
github_alerts = true
insert_anchor_links = "right"

[markdown.highlighting]
style = "inline"
theme = "monokai"

[search]
include_title = true
include_description = true
include_content = true

[extra]
color_scheme = "terminus"
copy_button = true
show_default_author = true
copyright = "© $YEAR $AUTHOR :: Powered by [Zola](https://www.getzola.org) :: Theme by [ebkalderon](https://github.com/ebkalderon/terminus)"
goatcounter_code = "semog"

main_menu = [
  { name = "blog", url = "/posts/", trailing_slash = true },
  { name = "tags", url = "/tags/", trailing_slash = true },
  { name = "rss", url = "/rss.xml" },
]

socials = [
  { name = "github", url = "https://github.com/aksum" },
]

[extra.content_security_policy]
enable = true
allowed_domains = [
  { directive = "base-uri", domains = ["'self'"] },
  { directive = "connect-src", domains = ["'self'", "semog.goatcounter.com"] },
  { directive = "form-action", domains = ["'self'"] },
  { directive = "script-src", domains = ["'self'", "semog.goatcounter.com"] },
]
